---
layout: compress
---
<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>{% if page.title %}{{ page.title | escape }}{% else %}{{ site.title | escape }}{% endif %}</title>

    <meta name="description" content="{{ site.description }}">
    <link rel="canonical" href="{{ page.url | replace:'index.html','' | prepend: site.baseurl | prepend: site.url }}">

    <link rel="stylesheet" href="{{ site.baseurl }}/css/home.css">
    <link rel="shortcut icon" type="image/x-icon" href="{{ site.baseurl }}/favicon.ico" />

    <style>
        /* Ajustes básicos para que se vea más moderno */
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        .head-text {
            font-size: 1.4em;
            color: #b3b3b3;
            margin-bottom: 30px;
        }
        /* Grid para las tarjetas de las presentaciones */
        .pack {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        .link {
            text-decoration: none;
        }
        /* Tarjetas mejoradas y responsivas */
        .card {
            width: 260px !important;
            height: 140px !important;
            border-radius: 8px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 15px rgba(0,0,0,0.5);
        }
        .card-number {
            font-size: 0.9em;
            opacity: 0.7;
            font-weight: bold;
            text-align: left;
        }
        .card-title {
            font-size: 1.1em !important;
            font-weight: 600;
            line-height: 1.3;
            text-align: left;
            word-wrap: break-word;
        }
    </style>
</head>

<body>
    <header>
        <a href="{{ site.baseurl }}">
            <div class="brand">
                <img class="logo" src="{{ site.baseurl }}/images/webjeda-slides.svg" alt="webjeda-slides">
                <h1 class="headline">{{ site.title }}</h1>
            </div>
        </a>
    </header>

    <div class="pack">
        <p class="head-text">Panel de Presentaciones Interactivas</p>

        {% for post in site.posts %}
        <a target="_blank" class="link" href="{{ site.baseurl }}{{ post.url }}">
            <!-- Agregamos efectos de color fijos y limpios -->
            <div class="card" style="background-color: {% cycle '#2c3e50', '#16a085', '#d35400', '#2980b9', '#8e44ad', '#27ae60' %};">
                <div class="card-number">
                    Presentación #{{ forloop.rindex }}
                </div>
                <div class="card-title">
                    <!-- Quitamos el truncate para que el título de tus tareas se lea completo -->
                    {{ post.title }}
                </div>
            </div>
        </a>
        {% endfor %}
    </div>

    {% include analytics.html %}
</body>
</html>
